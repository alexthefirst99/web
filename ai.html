<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu N (Alex) Tran | AI Neural Interface</title>
    <link rel="icon" type="image/svg+xml" href="assets/media/favicon.svg?v=3">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #05070a;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            margin: 0;
            padding: 0;
        }
        #entry-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: radial-gradient(ellipse at center, #2d1b4e 0%, #05070a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            opacity: 1;
            transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        #entry-overlay.hidden {
            opacity: 0;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #a855f7;
            border-right-color: #f43f5e;
            animation: spin 0.8s linear infinite;
        }
        .loading-text {
            color: #a855f7;
            font-family: monospace;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            opacity: 0.7;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Entry transition overlay — fades out once page loads -->
    <div id="entry-overlay">
        <div class="spinner"></div>
        <div class="loading-text">NEURAL INTERFACE LOADING...</div>
    </div>

    <!-- Fullscreen Iframe hiding the Vercel URL -->
    <iframe src="https://meet-alex-ai.vercel.app/" allow="autoplay; encrypted-media; speaker" title="Neural Interface"></iframe>

    <script>
        // Fade out the entry overlay shortly after page loads
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('entry-overlay').classList.add('hidden');
            }, 300);
        });
    </script>
</body>
</html>
